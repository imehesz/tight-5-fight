<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<!-- No viewport-fit=cover: it lets the layout viewport (and so the
		     canvas) extend underneath Android's gesture pill / nav bar, which
		     is exactly where the bottom row of buttons lives. Stock Godot
		     meta keeps the page inside the safe area. -->
		<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
		<title>$GODOT_PROJECT_NAME</title>
		<style>
html, body, #canvas {
	margin: 0;
	padding: 0;
	border: 0;
}

body {
	color: white;
	background-color: black;
	overflow: hidden;
	touch-action: none;
}

#canvas {
	display: block;
}

#canvas:focus {
	outline: none;
}

#status, #status-splash, #status-progress {
	position: absolute;
	left: 0;
	right: 0;
}

#status, #status-splash {
	top: 0;
	bottom: 0;
}

#status {
	background-color: $GODOT_SPLASH_COLOR;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	visibility: hidden;
}

#status-splash {
	max-height: 100%;
	max-width: 100%;
	margin: auto;
}

#status-splash.show-image--false {
	display: none;
}

#status-splash.fullsize--true {
	height: 100%;
	width: 100%;
	object-fit: contain;
}

#status-splash.use-filter--false {
	image-rendering: pixelated;
}

#status-progress, #status-notice {
	display: none;
}

#status-progress {
	bottom: 10%;
	width: 50%;
	margin: 0 auto;
}

#status-notice {
	background-color: #5b3943;
	border-radius: 0.5rem;
	border: 1px solid #9b3943;
	color: #e0e0e0;
	font-family: 'Noto Sans', 'Droid Sans', Arial, sans-serif;
	line-height: 1.3;
	margin: 0 2rem;
	overflow: hidden;
	padding: 1rem;
	text-align: center;
	z-index: 1;
}

/* --- Landscape gate -------------------------------------------------------
   The engine's window/handheld/orientation setting only applies to native
   Android/iOS builds; on the Web the browser decides. So we cover the canvas
   with a "rotate your phone" panel whenever a touch device is in portrait.
   Pure CSS media query, so it reacts instantly with no resize listener. */

@font-face {
	font-family: 'Press Start 2P';
	src: url('PressStart2P-Regular.ttf?v={{version}}') format('truetype');
	font-display: swap;
}

#rotate-gate {
	display: none;
	position: fixed;
	inset: 0;
	z-index: 100;
	background-color: #000;
	color: #fff;
	font-family: 'Press Start 2P', 'Courier New', monospace;
	text-align: center;
	flex-direction: column;
	align-items: center;
	justify-content: center;
	gap: 1.6rem;
	padding: 2rem 1.4rem;
	box-sizing: border-box;
	touch-action: none;
	-webkit-user-select: none;
	user-select: none;
}

#rotate-gate .rotate-phone {
	width: 84px;
	height: 84px;
	animation: rotate-hint 2.4s ease-in-out infinite;
}

#rotate-gate .rotate-title {
	font-size: 1rem;
	line-height: 1.7;
	color: #ffd23f;
}

#rotate-gate .rotate-sub {
	font-size: 0.62rem;
	line-height: 1.9;
	color: #fff;
}

#rotate-gate .rotate-hint {
	font-size: 0.5rem;
	line-height: 1.9;
	color: #8a8a8a;
	max-width: 26em;
}

@keyframes rotate-hint {
	0%, 30% { transform: rotate(0deg); }
	55%, 85% { transform: rotate(-90deg); }
	100% { transform: rotate(0deg); }
}

@media (prefers-reduced-motion: reduce) {
	#rotate-gate .rotate-phone { animation: none; transform: rotate(-90deg); }
}

/* Touch devices only — a narrow desktop window should not lock anyone out. */
@media (orientation: portrait) and (pointer: coarse) {
	#rotate-gate { display: flex; }
}
		</style>
		$GODOT_HEAD_INCLUDE
	</head>
	<body>
		<canvas id="canvas">
			Your browser does not support the canvas tag.
		</canvas>

		<noscript>
			Your browser does not support JavaScript.
		</noscript>

		<div id="status">
			<img id="status-splash" class="$GODOT_SPLASH_CLASSES" src="$GODOT_SPLASH?v={{version}}" alt="">
			<progress id="status-progress"></progress>
			<div id="status-notice"></div>
		</div>

		<div id="rotate-gate" role="alertdialog" aria-label="Please rotate your device to landscape">
			<svg class="rotate-phone" viewBox="0 0 48 48" fill="none" aria-hidden="true">
				<rect x="14" y="4" width="20" height="40" rx="3" stroke="#ffd23f" stroke-width="3"/>
				<line x1="20" y1="9" x2="28" y2="9" stroke="#ffd23f" stroke-width="2" stroke-linecap="round"/>
				<circle cx="24" cy="38" r="2" fill="#ffd23f"/>
			</svg>
			<div class="rotate-title">ROTATE<br>YOUR PHONE</div>
			<div class="rotate-sub">THIS FIGHT IS<br>LANDSCAPE ONLY</div>
			<div class="rotate-hint">Nothing happening? Turn off rotation lock in your Control Center / quick settings.</div>
		</div>

		<script src="$GODOT_URL?v={{version}}"></script>
		<script>
// --- Cache busting --------------------------------------------------------
// deployScriptPROD.sh rewrites every {{version}} in the built index.html with
// the build stamp (the same one Settings shows as v.1.0.<stamp>) right before
// rsync, so a new deploy always lands on fresh URLs.
//
// The <script> tag above and the font/splash URLs carry ?v= directly, but the
// two big files — index.wasm and index.pck — are fetched by the engine itself
// from paths it builds internally ("index" + extension), with no config hook
// to version them. So we wrap fetch() and tag those requests on the way out.
// The engine calls the global fetch() at load time, so this must run before
// startGame() below — it does.
(function () {
	const raw = '{{version}}';
	// Unreplaced placeholder => running a local/unbaked build, skip busting.
	if (raw.indexOf('{{') === 0) {
		return;
	}
	const bustable = /(^|\/)index\.(wasm|pck)$/;
	const nativeFetch = window.fetch.bind(window);
	window.fetch = function (input, init) {
		if (typeof input === 'string' && bustable.test(input.split('?')[0])) {
			return nativeFetch(input + (input.indexOf('?') === -1 ? '?' : '&') + 'v=' + raw, init);
		}
		return nativeFetch(input, init);
	};
}());

// --- iOS WebAudio unlock ---------------------------------------------------
// Godot builds its AudioContext during startGame(), i.e. before the player has
// touched anything, so it is born suspended. The engine does ask the browser to
// resume it from its own input handlers, which is enough for Android Chrome and
// desktop — but iOS Safari also wants a buffer to have actually flowed through
// the graph inside a real user gesture before it will route audio anywhere. Not
// getting that is why the iPhone build was silent while everything else worked.
//
// Safari also suspends the context whenever the app is backgrounded or the
// phone is locked and does NOT always fire the engine's resume path on return,
// so these listeners stay installed for the whole session rather than removing
// themselves after the first tap. They cost nothing while the context is
// already running.
//
// This must run before engine.startGame() below so the wrapper is in place when
// the engine constructs its context — it does.
(function () {
	const Native = window.AudioContext || window.webkitAudioContext;
	if (!Native) {
		return;
	}
	const contexts = [];
	function TrackedAudioContext() {
		const ctx = Reflect.construct(Native, arguments, Native);
		contexts.push(ctx);
		hardenAddModule(ctx);
		return ctx;
	}
	TrackedAudioContext.prototype = Native.prototype;
	window.AudioContext = TrackedAudioContext;
	if (window.webkitAudioContext) {
		window.webkitAudioContext = TrackedAudioContext;
	}

	// This project exports with audio/general/default_playback_type.web = 1
	// (Sample), Godot 4.4's web default. In that mode EVERY sound — music and
	// SFX alike — is gated behind a single promise: the engine loads
	// index.audio.position.worklet.js once at startup and each sample node
	// awaits it before calling start(). If that one addModule() rejects or
	// never settles, the game is completely silent with no error the player
	// can see. Godot requests it immediately after constructing the context,
	// i.e. while it is still suspended, which is exactly the situation Safari
	// is unreliable in.
	//
	// So: retry instead of accepting the first answer, and race each attempt
	// against a timeout so a promise that simply never settles is covered too.
	// The returned promise resolves on the first success and only rejects once
	// we are out of attempts — a stall here degrades to the silence we already
	// have, never to something worse.
	const ATTEMPT_TIMEOUT_MS = 2500;
	const MAX_ATTEMPTS = 6;

	function hardenAddModule(ctx) {
		const worklet = ctx.audioWorklet;
		if (!worklet || typeof worklet.addModule !== 'function') {
			return;
		}
		const nativeAddModule = worklet.addModule.bind(worklet);
		worklet.addModule = function (url, options) {
			return new Promise(function (resolve, reject) {
				let attempts = 0;
				function attempt() {
					attempts += 1;
					let settled = false;
					nativeAddModule(url, options).then(function () {
						settled = true;
						resolve();
					}, function (err) {
						settled = true;
						retry(err);
					});
					setTimeout(function () {
						if (!settled) {
							retry(new Error('addModule timed out: ' + url));
						}
					}, ATTEMPT_TIMEOUT_MS);
				}
				function retry(err) {
					if (attempts >= MAX_ATTEMPTS) {
						reject(err);
						return;
					}
					// A tap between now and then is what usually makes the
					// difference, so leave room for one.
					setTimeout(attempt, 600);
				}
				attempt();
			});
		};
	}

	// iOS puts a page's WebAudio on the "ambient" audio session, which the
	// phone's physical mute switch silences outright — there is no equivalent
	// on Android, which is why that build was fine. Declaring the session as
	// "playback" moves us onto the media channel, so the game is audible with
	// the ringer switch off, same as a video. Safari 16.4+; a no-op elsewhere.
	function claimPlaybackSession() {
		try {
			if (navigator.audioSession && navigator.audioSession.type !== 'playback') {
				navigator.audioSession.type = 'playback';
			}
		} catch (err) {
			/* older Safari: nothing we can do from here */
		}
	}
	claimPlaybackSession();

	let primed = false;
	function unlock() {
		claimPlaybackSession();
		contexts.forEach(function (ctx) {
			if (ctx.state === 'running' && primed) {
				return;
			}
			try {
				const promise = ctx.resume();
				if (promise && typeof promise.catch === 'function') {
					promise.catch(function () { /* nothing else to try */ });
				}
			} catch (err) {
				/* closed context */
			}
			// One silent frame. This is the part iOS actually requires, and it
			// has to happen inside the gesture — which is where we are.
			try {
				const source = ctx.createBufferSource();
				source.buffer = ctx.createBuffer(1, 1, ctx.sampleRate);
				source.connect(ctx.destination);
				source.start(0);
				primed = true;
			} catch (err) {
				/* context not usable yet; the next gesture retries */
			}
		});
	}

	['touchstart', 'touchend', 'pointerdown', 'mousedown', 'keydown'].forEach(function (type) {
		window.addEventListener(type, unlock, { passive: true, capture: true });
	});
	document.addEventListener('visibilitychange', function () {
		if (!document.hidden) {
			unlock();
		}
	});
	window.addEventListener('pageshow', unlock);
}());

const GODOT_CONFIG = $GODOT_CONFIG;
const GODOT_THREADS_ENABLED = $GODOT_THREADS_ENABLED;
const engine = new Engine(GODOT_CONFIG);

// Best-effort hard lock. Only Android Chrome/Firefox honour this, and only
// while fullscreen, so it is a bonus on top of the CSS gate above — never the
// only defence. iOS Safari has no Screen Orientation lock at all.
(function () {
	function lockLandscape() {
		try {
			const orientation = window.screen && window.screen.orientation;
			if (orientation && typeof orientation.lock === 'function') {
				const promise = orientation.lock('landscape');
				if (promise && typeof promise.catch === 'function') {
					promise.catch(function () { /* not permitted here; CSS gate covers it */ });
				}
			}
		} catch (err) {
			/* unsupported browser */
		}
	}
	document.addEventListener('fullscreenchange', lockLandscape);
	document.addEventListener('webkitfullscreenchange', lockLandscape);
	window.addEventListener('load', lockLandscape);
}());

(function () {
	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice = document.getElementById('status-notice');

	let initializing = true;
	let statusMode = '';

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) {
			return;
		}
		if (mode === 'hidden') {
			statusOverlay.remove();
			initializing = false;
			return;
		}
		statusOverlay.style.visibility = 'visible';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) {
			statusNotice.removeChild(statusNotice.lastChild);
		}
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		console.error(err);
		if (err instanceof Error) {
			setStatusNotice(err.message);
		} else if (typeof err === 'string') {
			setStatusNotice(err);
		} else {
			setStatusNotice('An unknown error occurred.');
		}
		setStatusMode('notice');
		initializing = false;
	}

	const missing = Engine.getMissingFeatures({
		threads: GODOT_THREADS_ENABLED,
	});

	if (missing.length !== 0) {
		if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
			let serviceWorkerRegistrationPromise;
			try {
				serviceWorkerRegistrationPromise = navigator.serviceWorker.getRegistration();
			} catch (err) {
				serviceWorkerRegistrationPromise = Promise.reject(new Error('Service worker registration failed.'));
			}
			// There's a chance that installing the service worker would fix the issue
			Promise.race([
				serviceWorkerRegistrationPromise.then((registration) => {
					if (registration != null) {
						return Promise.reject(new Error('Service worker already exists.'));
					}
					return registration;
				}).then(() => engine.installServiceWorker()),
				// For some reason, `getRegistration()` can stall
				new Promise((resolve) => {
					setTimeout(() => resolve(), 2000);
				}),
			]).then(() => {
				// Reload if there was no error.
				window.location.reload();
			}).catch((err) => {
				console.error('Error while registering service worker:', err);
			});
		} else {
			// Display the message as usual
			const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
			displayFailureNotice(missingMsg + missing.join('\n'));
		}
	} else {
		setStatusMode('progress');
		engine.startGame({
			'onProgress': function (current, total) {
				if (current > 0 && total > 0) {
					statusProgress.value = current;
					statusProgress.max = total;
				} else {
					statusProgress.removeAttribute('value');
					statusProgress.removeAttribute('max');
				}
			},
		}).then(() => {
			setStatusMode('hidden');
		}, displayFailureNotice);
	}
}());
		</script>
	</body>
</html>
